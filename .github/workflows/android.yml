name: Smart Travel App CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show exact file contents
        run: |
          echo "===== ROOT build.gradle ====="
          cat build.gradle
          echo ""
          echo "===== settings.gradle ====="
          cat settings.gradle
          echo ""
          echo "===== app/build.gradle ====="
          cat app/build.gradle
          echo ""
          echo "===== app/build.gradle first line ====="
          head -1 app/build.gradle

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug -x test -x lint --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
