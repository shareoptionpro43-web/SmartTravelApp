name: Smart Travel App CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show project structure
        run: |
          echo "=== ROOT FILES ==="
          ls -la
          echo "=== APP FOLDER ==="
          ls -la app/ || echo "app/ folder NOT FOUND"
          echo "=== SETTINGS.GRADLE CONTENT ==="
          cat settings.gradle

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: List Gradle tasks
        run: ./gradlew tasks --all 2>&1 | head -60

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug -x test -x lint --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
